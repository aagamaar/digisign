spring.application.name=digisign

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/digisign_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD:your_actual_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Properties (Creates tables automatically based on Java code later)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect