
# Database Configuration (Railway-compatible)
spring.datasource.url=jdbc:mysql://localhost:3306/digisign_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Server Configuration (Railway-compatible)
server.port=${PORT:8080}
server.servlet.context-path=/

# Application Name
spring.application.name=digisign

# Logging
logging.level.root=INFO
logging.level.com.example.digisign=DEBUG

# Connection Pool (important for Railway)
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=20000